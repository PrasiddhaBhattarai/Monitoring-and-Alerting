services:
  #-----frontend-----
  web:
    build: ./web
    image: web:latest
    container_name: web
    ports:
      - "5050:5000"
    restart: unless-stopped

  #-----backend-----
  api:
    build: ./api
    image: api:latest
    container_name: api
    ports:
      - "5051:5001"
    restart: unless-stopped

  #-----db-----
  db:
    image: postgres:14
    container_name: db
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=mydb
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  #-----prometheus-----
  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    depends_on:
      - web
      - api
      - db
      - node-exporter
      - db-exporter
    restart: unless-stopped
  
  #-----node-exporter-----
  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    ports:
      - "9100:9100"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev)($|/)"
    restart: unless-stopped

  #-----db-exporter-----
  db-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: db-exporter
    environment:
      # db connection string: username:pwd@db-host:5432/dbname
      - DATA_SOURCE_NAME=postgresql://root:root@db:5432/mydb?sslmode=disable
    ports:
      - "9187:9187"   #default postgres_exporter port
    depends_on:
      - db
    restart: unless-stopped

  #-----grafana-----
  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  #-----alertmanager-----
  alertmanager:
    image: prom/alertmanager:v0.32.1
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    restart: unless-stopped


volumes:
  db-data:
  grafana-data:
  alertmanager-data: