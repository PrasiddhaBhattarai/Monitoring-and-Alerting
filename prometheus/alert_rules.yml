groups:
  - name: app-alerts
    rules:
      - alert: WebErrorRateHigh
        expr: increase(app_errors_total{job="web"}[1m]) > 0
        for: 30s
        labels:
          severity: warning
        annotations:
          description: "web service errors detected on {{$labels.instance}}"

      - alert: ApiErrorRateHigh
        expr: increase(app_errors_total{job="api"}[1m]) > 3
        for: 30s
        labels:
          severity: critical
        annotations:
          description: "api service errors detected on {{$labels.instance}}"

      - alert: DatabaseHighConnections
        expr: pg_stat_activity_count{datname="mydb"} > 50
        for: 1m
        labels:
          severity: critical
        annotations:
          description: "Database Connection count exceeded safe limit."

      # applies to all scraped jobs
      - alert: InstanceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          description: "Instance {{$labels.instance}} of job {{$labels.job}} is down"